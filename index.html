<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tomb Busters Ticket System</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <style>
        :root {
            --blue-600: #2563eb;
            --blue-700: #1d4ed8;
            --red-500: #ef4444;
            --red-600: #dc2626;
            --gray-50: #f8fafc;
            --gray-100: #f1f5f9;
            --gray-200: #e2e8f0;
            --gray-300: #cbd5e1;
            --gray-400: #94a3b8;
            --gray-500: #64748b;
            --gray-600: #475569;
            --gray-700: #334155;
            --gray-800: #1e293b;
            --white: #ffffff;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        body {
            background: #f0f4f8;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Helvetica Neue', sans-serif;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background-image:
                radial-gradient(ellipse at 20% 0%, rgba(37, 99, 235, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 100%, rgba(37, 99, 235, 0.03) 0%, transparent 50%);
        }

        /* Fixed‑size page wrapper (640×960) */
        .page-wrapper {
            width: 640px;
            max-width: 100%;
            height: 960px;
            max-height: 100vh;
            margin: 0 auto;
            overflow: hidden;
            border-radius: 18px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
            display: flex;
            flex-direction: column;
            background: #ffffff;
            animation: fadeInUp 0.45s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header card */
        .header-card {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            border-radius: 18px 18px 0 0;
            padding: 24px 28px 20px;
            color: #ffffff;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.15);
        }

        .header-card::after {
            content: '';
            position: absolute;
            top: -50px;
            right: -50px;
            width: 140px;
            height: 140px;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 50%;
            pointer-events: none;
        }

        .header-card::before {
            content: '';
            position: absolute;
            bottom: -30px;
            left: -30px;
            width: 100px;
            height: 100px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 50%;
            pointer-events: none;
        }

        .header-icon-circle {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.18);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
            backdrop-filter: blur(4px);
        }

        /* Content card (scrollable if needed) */
        .content-card {
            flex: 1;
            overflow-y: auto;
            background: #ffffff;
            border-radius: 0 0 18px 18px;
            padding: 24px 28px 28px;
            border: 1px solid #e8ecf1;
            border-top: none;
        }

        /* Function card inside content */
        .func-card {
            background: #ffffff;
            border: 1px solid #e8ecf1;
            border-radius: 16px;
            padding: 22px 20px;
            transition: all 0.2s ease;
            position: relative;
        }

        .func-card:first-child {
            margin-bottom: 16px;
        }

        .func-card:hover {
            border-color: #d0d7e2;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.05);
        }

        .func-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 20px;
        }

        .func-icon.submit {
            background: #fef2f2;
            color: #ef4444;
        }

        .func-icon.check {
            background: #eff6ff;
            color: #2563eb;
        }

        /* Submit button - red */
        .btn-submit {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px 24px;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 0.2px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            transition: all 0.25s ease;
            color: #ffffff;
            background: #ef4444;
            min-height: 54px;
            text-decoration: none;
            -webkit-user-select: none;
            user-select: none;
            outline: none;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.25);
        }

        .btn-submit:hover:not(:disabled) {
            background: #dc2626;
            box-shadow: 0 6px 20px rgba(220, 38, 38, 0.35);
            transform: translateY(-1px);
        }

        .btn-submit:active:not(:disabled) {
            transform: scale(0.975);
            box-shadow: 0 2px 6px rgba(239, 68, 68, 0.2);
            transition: all 0.08s ease;
        }

        .btn-submit:disabled {
            background: #d1d5db;
            color: #9ca3af;
            cursor: not-allowed;
            box-shadow: none;
            pointer-events: none;
            border: 1px solid #e5e7eb;
        }

        /* Check button - blue */
        .btn-check {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px 24px;
            font-size: 17px;
            font-weight: 600;
            letter-spacing: 0.2px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            transition: all 0.25s ease;
            color: #ffffff;
            background: #2563eb;
            min-height: 54px;
            text-decoration: none;
            -webkit-user-select: none;
            user-select: none;
            outline: none;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
        }

        .btn-check:hover {
            background: #1d4ed8;
            box-shadow: 0 6px 20px rgba(29, 78, 216, 0.35);
            transform: translateY(-1px);
        }

        .btn-check:active {
            transform: scale(0.975);
            box-shadow: 0 2px 6px rgba(37, 99, 235, 0.2);
            transition: all 0.08s ease;
        }

        /* Expired hint */
        .expired-hint {
            display: none;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #ef4444;
            letter-spacing: 0.2px;
        }

        .expired-hint.visible {
            display: flex;
        }

        .expired-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            flex-shrink: 0;
            animation: blinkRed 1.2s ease-in-out infinite;
        }

        @keyframes blinkRed {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.35;
            }
        }

        /* Active indicator */
        .active-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            font-size: 13px;
            font-weight: 500;
            color: #22c55e;
            letter-spacing: 0.2px;
        }

        .active-indicator.hidden {
            display: none;
        }

        .active-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #22c55e;
            flex-shrink: 0;
            box-shadow: 0 0 6px rgba(34, 197, 94, 0.5);
        }

        /* Scrollbar styling for content card */
        .content-card::-webkit-scrollbar {
            width: 5px;
        }
        .content-card::-webkit-scrollbar-track {
            background: transparent;
        }
        .content-card::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <main class="page-wrapper" role="main" aria-label="Tomb Busters Ticket System">

        <!-- Header -->
        <div class="header-card">
            <div style="display:flex;align-items:center;gap:14px;position:relative;z-index:1;">
                <div class="header-icon-circle" aria-hidden="true">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 6v6l4 2"/>
                    </svg>
                </div>
                <div>
                    <h1 style="font-size:21px;font-weight:700;color:#ffffff;margin:0;line-height:1.3;letter-spacing:0.2px;">
                        Tomb Busters Ticket System
                    </h1>
                    <p style="font-size:13px;color:rgba(255,255,255,0.85);margin:4px 0 0;letter-spacing:0.15px;">
                        Submit or check your support tickets
                    </p>
                </div>
            </div>
        </div>

        <!-- Content Area -->
        <div class="content-card">

            <!-- Submit Ticket Card -->
            <div class="func-card" aria-labelledby="submit-title">
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
                    <div class="func-icon submit" aria-hidden="true">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 5v14M5 12h14"/>
                        </svg>
                    </div>
                    <span id="submit-title" style="font-size:16px;font-weight:600;color:#1e293b;letter-spacing:0.15px;">
                        Submit a Ticket
                    </span>
                </div>
                <button
                id="btnSubmit"
                class="btn-submit"
                aria-label="Submit a new support ticket"
                title="Submit Ticket"
            >
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M12 5v14M5 12h14"/>
            </svg>
            Submit Ticket
        </button>
        <!-- Active indicator (hidden when expired) -->
        <div id="activeIndicator" class="active-indicator" aria-live="polite">
            <span class="active-dot"></span> Active
        </div>
        <!-- Expired hint (visible only when expired) -->
        <div id="expiredHint" class="expired-hint" aria-live="assertive">
            <span class="expired-dot"></span> Link expired
        </div>
    </div>

    <!-- Check Ticket Card -->
    <div class="func-card" aria-labelledby="check-title">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px;">
            <div class="func-icon check" aria-hidden="true">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"/>
                    <path d="M21 21l-4.35-4.35"/>
                </svg>
            </div>
            <span id="check-title" style="font-size:16px;font-weight:600;color:#1e293b;letter-spacing:0.15px;">
                Check Ticket Status
            </span>
        </div>
        <button
        id="btnCheck"
        class="btn-check"
        aria-label="Check existing ticket status"
        title="Check Ticket"
    >
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/>
        <path d="M21 21l-4.35-4.35"/>
    </svg>
    Check Ticket
</button>
</div>

</div>

</main>

<script>
    (function() {
        // ============================================================
        // Constants
        // ============================================================
        const SUBMIT_URL =
            'https://giantnetwork.qiyukf.com/worksheet/page/plugin/submit?pluginId=a105e6dee58a4b77868640c1418f704&type=1';
        const CHECK_URL =
            'https://giantnetwork.qiyukf.com/worksheet/page/plugin/list?pluginId=a105e6dee58a4b77868640c1418f704&type=1';
        const ONE_HOUR_MS = 60 * 60 * 1000; // 1 hour in milliseconds
        const STORAGE_KEY = 'tomb_busters_ticket_open_time_v1';

        // ============================================================
        // DOM Element References
        // ============================================================
        const btnSubmit = document.getElementById('btnSubmit');
        const btnCheck = document.getElementById('btnCheck');
        const activeIndicator = document.getElementById('activeIndicator');
        const expiredHint = document.getElementById('expiredHint');

        // ============================================================
        // State
        // ============================================================
        let openTime = null;
        let expireTime = null;
        let isExpired = false;
        let expireTimeoutId = null;
        let storageAvailable = true;

        // ============================================================
        // Safe localStorage helpers
        // ============================================================
        function safeGetItem(key) {
            try {
                return localStorage.getItem(key);
            } catch (e) {
                storageAvailable = false;
                return null;
            }
        }

        function safeSetItem(key, value) {
            try {
                localStorage.setItem(key, value);
                return true;
            } catch (e) {
                storageAvailable = false;
                return false;
            }
        }

        function safeRemoveItem(key) {
            try {
                localStorage.removeItem(key);
                return true;
            } catch (e) {
                storageAvailable = false;
                return false;
            }
        }

        // ============================================================
        // Initialize open time from storage or create new
        // ============================================================
        function initializeOpenTime() {
            const stored = safeGetItem(STORAGE_KEY);
            if (stored) {
                const parsed = parseInt(stored, 10);
                if (!isNaN(parsed) && parsed > 0) {
                    if (Date.now() - parsed < ONE_HOUR_MS) {
                        openTime = parsed;
                    } else {
                        openTime = parsed;
                    }
                } else {
                    openTime = Date.now();
                    safeSetItem(STORAGE_KEY, openTime.toString());
                }
            } else {
                openTime = Date.now();
                safeSetItem(STORAGE_KEY, openTime.toString());
            }
            expireTime = openTime + ONE_HOUR_MS;
            isExpired = Date.now() >= expireTime;
        }

        // ============================================================
        // Update UI based on expiration state
        // ============================================================
        function updateExpiredState() {
            const now = Date.now();
            isExpired = now >= expireTime;

            if (isExpired) {
                btnSubmit.disabled = true;
                btnSubmit.setAttribute('aria-disabled', 'true');
                btnSubmit.title = 'This link has expired';
                expiredHint.classList.add('visible');
                activeIndicator.classList.add('hidden');
                if (expireTimeoutId) {
                    clearTimeout(expireTimeoutId);
                    expireTimeoutId = null;
                }
            } else {
                btnSubmit.disabled = false;
                btnSubmit.setAttribute('aria-disabled', 'false');
                btnSubmit.title = 'Submit a new support ticket';
                activeIndicator.classList.remove('hidden');
                expiredHint.classList.remove('visible');
                scheduleExpirationCheck();
            }
        }

        // ============================================================
        // Schedule a timeout to update UI exactly when expiration occurs
        // ============================================================
        function scheduleExpirationCheck() {
            if (expireTimeoutId) {
                clearTimeout(expireTimeoutId);
                expireTimeoutId = null;
            }
            if (isExpired) return;
            const remaining = expireTime - Date.now();
            if (remaining <= 0) {
                updateExpiredState();
                return;
            }
            expireTimeoutId = setTimeout(function() {
                expireTimeoutId = null;
                updateExpiredState();
            }, remaining + 100);
        }

        // ============================================================
        // Button Click Handlers
        // ============================================================
        function handleSubmitClick(event) {
            if (Date.now() >= expireTime) {
                event.preventDefault();
                isExpired = true;
                updateExpiredState();
                btnSubmit.style.transform = 'scale(0.95)';
                setTimeout(function() {
                    btnSubmit.style.transform = '';
                }, 150);
                return false;
            }
            window.location.href = SUBMIT_URL;
            return true;
        }

        function handleCheckClick(event) {
            window.location.href = CHECK_URL;
        }

        // ============================================================
        // Reset timer (exposed for debugging via console)
        // ============================================================
        function resetTimer() {
            safeRemoveItem(STORAGE_KEY);
            openTime = Date.now();
            expireTime = openTime + ONE_HOUR_MS;
            isExpired = false;
            safeSetItem(STORAGE_KEY, openTime.toString());
            updateExpiredState();
            scheduleExpirationCheck();
        }
        window.__resetTicketTimer = resetTimer;

        // ============================================================
        // Initialize Everything
        // ============================================================
        function init() {
            initializeOpenTime();
            updateExpiredState();
            scheduleExpirationCheck();

            btnSubmit.addEventListener('click', handleSubmitClick);
            btnCheck.addEventListener('click', handleCheckClick);

            [btnSubmit, btnCheck].forEach(function(btn) {
                btn.addEventListener('touchstart', function(e) {}, { passive: true });
            });

            console.log('[TombBustersTicket] Initialized.');
            console.log('[TombBustersTicket] Open time:', new Date(openTime).toISOString());
            console.log('[TombBustersTicket] Expire time:', new Date(expireTime).toISOString());
            console.log('[TombBustersTicket] Expired:', isExpired);
            if (!isExpired) {
                const remainingSec = Math.max(0, Math.floor((expireTime - Date.now()) / 1000));
                console.log('[TombBustersTicket] Submit link expires in',
                    Math.floor(remainingSec / 60) + 'm ' + (remainingSec % 60) + 's');
            } else {
                console.log('[TombBustersTicket] Submit link has EXPIRED.');
            }
        }

        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                const now = Date.now();
                if ((now >= expireTime) !== isExpired) {
                    updateExpiredState();
                    if (!isExpired) scheduleExpirationCheck();
                }
            }
        });

        window.addEventListener('beforeunload', function() {
            if (expireTimeoutId) {
                clearTimeout(expireTimeoutId);
                expireTimeoutId = null;
            }
        });

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
</script>
</body>
</html>
